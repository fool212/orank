<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恭喜你获得孙悟空地狱火皮肤！</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="prize-box">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <h1>🎉 恭喜你！🎉</h1>
            <div class="phone-image">🔥🐵🔥</div>
            <h2>你获得了 孙悟空-地狱火皮肤！</h2>
            <p class="subtitle">价值 ¥168 元</p>
            <p class="count-text">已有 <span id="count">1,234,567</span> 人领取</p>
            <button id="claimBtn" class="claim-btn">立即领取</button>
            <p class="timer">限时优惠：<span id="timer">00:59</span></p>
        </div>
        
        <div id="modal" class="modal">
            <div class="modal-content">
                <h2 id="modalTitle">😅 再试一次！</h2>
                <p id="modalText">按钮好像有点调皮...</p>
                <button id="modalBtn" class="modal-btn">继续领取</button>
            </div>
        </div>
        
        <div id="finalModal" class="modal">
            <div class="modal-content final">
                <h2>🎊 整蛊成功！🎊</h2>
                <p>别担心，没有地狱火皮肤</p>
                <p>但你有我这个朋友呀！😄</p>
                <div class="share-text">把这个链接分享给你的朋友吧！</div>
                <button onclick="location.reload()" class="restart-btn">再来一次</button>
            </div>
        </div>
    </div>
    
    <div class="falling-emojis"></div>
    
    <script src="script.js"></script>
</body>
</html>
